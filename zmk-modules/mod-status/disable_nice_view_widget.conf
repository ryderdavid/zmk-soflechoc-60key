# Passed via cmake-args OVERLAY_CONFIG for the left+nice_view build.
#
# Explicitly disables the stock nice!view widget status screen so that our
# mod-status module can provide its own custom_status_screen.c without linker
# conflicts.  An explicit conf-file assignment overrides the
# `imply NICE_VIEW_WIDGET_STATUS` in nice_view/Kconfig.defconfig.
#
# The mod-status module's own Kconfig re-selects the required LVGL fonts and
# features (LV_FONT_MONTSERRAT_14/16/18, LV_USE_CANVAS, etc.) so they remain
# available for the nice!view widget sources compiled by our CMakeLists.txt.
CONFIG_NICE_VIEW_WIDGET_STATUS=n
